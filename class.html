<!-- lesson.html：最終課程內容頁 -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>課程內容</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .card {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.1);
    }
    img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
  </style>
</head>
<body>
  <div class="card">
    <img id="lesson-image" src="" alt="課程圖">
    <h2 id="lesson-title">課程名稱</h2>
    <p id="lesson-time"></p>
    <p id="lesson-teacher"></p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const courseClass = params.get('class');
    const courseId = params.get('id');

    const courseData = {
      junior: {
        1: { title: "國小一年級數學", teacher: "小美老師", time: "每週二 16:00", image: "images/junior1.jpg" },
        2: { title: "國小二年級自然", teacher: "小志老師", time: "每週四 17:00", image: "images/junior2.jpg" }
      },
      senior: {
        1: { title: "國中數學先修", teacher: "大明老師", time: "每週三 18:00", image: "images/senior1.jpg" },
        2: { title: "國中英文寫作", teacher: "小艾老師", time: "每週五 17:30", image: "images/senior2.jpg" }
      }
    };

    const info = courseData[courseClass]?.[courseId];
    if (info) {
      document.getElementById("lesson-title").textContent = info.title;
      document.getElementById("lesson-teacher").textContent = "👩‍🏫 老師：「" + info.teacher + "」";
      document.getElementById("lesson-time").textContent = "🕒 上課時間：「" + info.time + "」";
      document.getElementById("lesson-image").src = info.image;
      document.getElementById("lesson-image").alt = info.title;
    } else {
      document.querySelector(".card").innerHTML = '<p>查無此課程資料。</p>';
    }
  </script>
</body>
</html>
