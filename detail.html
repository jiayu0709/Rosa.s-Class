<!-- detail.html：課程卡片頁（部門分類下的課程卡片清單） -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>課程詳情</title>
  <style>
    body {
      font-family: sans-serif; /* 使用簡潔字體 */
      padding: 20px;
      background-color: #f5f5f5; /* 淡灰背景色 */
    }
    h1 {
      margin-bottom: 20px;
    }
    .card {
      display: block;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.1); /* 卡片陰影 */
      padding: 15px;
      margin-bottom: 20px;
      text-decoration: none;
      color: #333;
    }
    .card img {
      width: 100%; /* 照片佔滿整張卡片寬度 */
      height: auto;
      border-radius: 10px; /* 圓角照片 */
      margin-bottom: 10px;
    }
    .card-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .card-content {
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <!-- 顯示部門名稱（例如 國小部、國中部） -->
  <h1 id="class-title">課程分類</h1>

  <!-- 放置卡片的區塊 -->
  <div id="card-list"></div>

  <script>
    // 從網址取得 ?department=xxx 的參數
    const params = new URLSearchParams(window.location.search);
    const departmentin = params.get('department');

    // 類別對應的中文名稱（顯示在畫面上）
    const classTitleMap = {
      baby: "國小部",
      elementary: "國小部",
      junior: "國中部"
    };

    // 每個部門底下的課程資料清單（含圖片）
    const cardData = {
      baby: [
        {
          id: 1,
          name: "全美外師互動班",
          content: "全美語環境，外師互動學習",
          image: "images/baby1.jpg"
        },
        {
          id: 2,
          name: "自然科學探索班",
          content: "動手做實驗，培養科學素養",
          image: "images/baby2.jpg"
        }
      ],
      elementary: [
        {
          id: 1,
          name: "國小數學邏輯班",
          content: "以遊戲方式訓練數感",
          image: "images/ele1.jpg"
        },
        {
          id: 2,
          name: "英文會話初階班",
          content: "打好英文溝通基礎",
          image: "images/ele2.jpg"
        }
      ],
      junior: [
        {
          id: 1,
          name: "國中數學先修",
          content: "提前進入會考數學內容",
          image: "images/junior1.jpg"
        },
        {
          id: 2,
          name: "國中英文寫作",
          content: "強化閱讀與寫作能力",
          image: "images/junior2.jpg"
        }
      ]
    };

    // 將分類名稱顯示在畫面上標題
    document.getElementById("class-title").textContent =
      classTitleMap[departmentin] || "課程分類";

    // 根據分類產生對應卡片內容
    const list = document.getElementById("card-list");
    (cardData[departmentin] || []).forEach(item => {
      const a = document.createElement('a');
      a.href = `lesson.html?class=${departmentin}&id=${item.id}`; // 點擊後導向單一課程頁
      a.className = 'card';
      a.innerHTML = `
        <img src="${item.image}" alt="${item.name}" />
        <div class="card-title">${item.name}</div>
        <div class="card-content">${item.content}</div>
      `;
      list.appendChild(a); // 加到網頁中
    });
  </script>
</body>
</html>
