<!-- detail.html：某課程的小卡片頁 -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>課程詳情</title>

  <!-- 內部 CSS 樣式 -->
  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f2f2f2; /* 淡灰背景 */
    }

    /* 最外層容器，設定寬度與置中 */
    .container {
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }

    .card {
      display: block;                    /* 卡片為區塊元素 */
      background: #fff;                  /* 白底 */
      border-radius: 10px;               /* 圓角 */
      box-shadow: 0 1px 5px rgba(0,0,0,0.1); /* 淡淡陰影 */
      padding: 15px;                     /* 內邊距 */
      margin-bottom: 15px;               /* 與下方間距 */
      text-decoration: none;             /* 去掉底線 */
      color: #333;                       /* 文字顏色 */
    }

    /* 卡片內圖片設定 */
    .card img {
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    /* 卡片內文區塊 */
    .card-body {
      padding: 10px;
    }

    .card-body h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .card-body a {
      color: #007aff;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <!-- 顯示部門名稱（例如 國小部、國中部） -->
  <h1 id="class-title">課程分類</h1>

  <!-- 放置卡片的區塊 -->
  <div id="card-list"></div>

  <script>
    // 從網址取得 ?department=xxx 的參數
    const params = new URLSearchParams(window.location.search);
    const departmentin = params.get('department');

    // 類別對應的中文名稱（顯示在畫面上）
    const classTitleMap = {
      baby: "國小部",
      elementary: "國小部",
      junior: "國中部"
    };

    // 每個部門底下的課程資料清單（含圖片）
    const cardData = {
      baby: [
        {
          id: 1,
          name: "全美外師互動班",
          content: "全美語環境，外師互動學習",
          image: "images/rosa1.jpg"
        },
        {
          id: 2,
          name: "自然科學探索班",
          content: "動手做實驗，培養科學素養",
          image: "images/rosa2.jpg"
        }
      ],
      elementary: [
        {
          id: 1,
          name: "國小數學邏輯班",
          content: "以遊戲方式訓練數感",
          image: "images/ele1.jpg"
        },
        {
          id: 2,
          name: "英文會話初階班",
          content: "打好英文溝通基礎",
          image: "images/ele2.jpg"
        }
      ],
      junior: [
        {
          id: 1,
          name: "國中數學先修",
          content: "提前進入會考數學內容",
          image: "images/junior1.jpg"
        },
        {
          id: 2,
          name: "國中英文寫作",
          content: "強化閱讀與寫作能力",
          image: "images/junior2.jpg"
        }
      ]
    };

    // 將分類名稱顯示在畫面上標題
    document.getElementById("class-title").textContent =
      classTitleMap[departmentin] || "課程分類";

    // 根據分類產生對應卡片內容
    const list = document.getElementById("card-list");
    (cardData[departmentin] || []).forEach(item => {
      const a = document.createElement('a');
      a.href = `lesson.html?class=${departmentin}&id=${item.id}`; // 點擊後導向單一課程頁
      a.className = 'card';
      a.innerHTML = `
        <img src="${item.image}" alt="${item.name}" />
        <div class="card-title">${item.name}</div>
        <div class="card-content">${item.content}</div>
      `;
      list.appendChild(a); // 加到網頁中
    });
  </script>
</body>
</html>
