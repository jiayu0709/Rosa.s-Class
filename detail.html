<!-- detail.html：某課程的小卡片頁 -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>課程詳情</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .card {
      display: block;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.1);
      padding: 15px;
      margin-bottom: 15px;
      text-decoration: none;
      color: #333;
    }
  </style>
</head>
<body>
  <h1 id="class-title">課程分類</h1>
  <div id="card-list"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const courseClass = params.get('class');

    const classTitleMap = {
      baby: "國小部",
      junior: "國小部",
      senior: "國中部"
    };

    const cardData = {
      baby: [
        { id: 1, title: "國小一年級數學" },
        { id: 2, title: "國小二年級自然" }
      ],
      junior: [
        { id: 1, title: "國小一年級數學" },
        { id: 2, title: "國小二年級自然" }
      ],
      senior: [
        { id: 1, title: "國中數學先修" },
        { id: 2, title: "國中英文寫作" }
      ]
    };

    document.getElementById("class-title").textContent = classTitleMap[courseClass] || "課程分類";
    const list = document.getElementById("card-list");
    (cardData[courseClass] || []).forEach(item => {
      const a = document.createElement('a');
      a.href = `lesson.html?class=${courseClass}&id=${item.id}`;
      a.className = 'card';
      a.textContent = item.title;
      list.appendChild(a);
    });
  </script>
</body>
</html>
