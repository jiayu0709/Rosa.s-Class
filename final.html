<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>課程詳細資訊</title>
  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f2f2f2;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      max-height: 250px;
      object-fit: cover;
      border-radius: 8px;
    }

    .card h2 {
      margin-top: 15px;
      font-size: 24px;
    }

    .card p {
      font-size: 16px;
      color: #555;
      margin-top: 10px;
    }

    .back-button {
      display: inline-block;
      margin: 30px auto 0;
      padding: 12px 30px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      color: #444;
      background-color: #fff;
      border: 2px solid #888;
      border-radius: 999px;
      text-decoration: none;
      box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.1);
      transition: all 0.2s ease-in-out;
    }

    .back-button:hover {
      background-color: #f9f9f9;
      transform: translateY(-2px);
      box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card" id="course-detail">
      <!-- 動態填入課程資訊 -->
    </div>
    <div style="text-align: center; margin-top: 30px;"></div>
    <a href="javascript:history.back()" class="back-button">返回上一頁</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const dpt = params.get("dpt");
    const courseName = params.get("course");
    const id = parseInt(params.get("id"));

    const courseList = {
      baby: [
        {
          id: 1,
          name: "全美外師互動班",
          image: "images/rosa2.jpg",
          descri: "全美語環境，外師互動學習"
        },
        {
          id: 2,
          name: "正音語文素養",
          image: "images/rosa2.jpg",
          descri: "注音符號教學與識字訓練"
        }
      ],
      elementary: [
        {
          id: 3,
          name: "思達數學",
          image: "images/rosa2.jpg",
          descri: "以遊戲方式訓練數感"
        },
        {
          id: 4,
          name: "作文閱讀班",
          image: "images/rosa2.jpg",
          descri: "提升閱讀理解與寫作技巧"
        }
      ],
      junior: [
        {
          id: 5,
          name: "國中數學先修",
          image: "images/rosa2.jpg",
          descri: "提前進入會考內容"
        },
        {
          id: 6,
          name: "國中英文寫作",
          image: "images/rosa2.jpg",
          descri: "強化閱讀與寫作能力"
        }
      ]
    };

    const selectedCourse = (courseList[dpt] || []).find(c => c.id === id);

    const detailBox = document.getElementById("course-detail");

    if (selectedCourse) {
      detailBox.innerHTML = `
        <img src="${selectedCourse.image}" alt="${selectedCourse.name}" />
        <h2>${selectedCourse.name}</h2>
        <p>${selectedCourse.descri}</p>
      `;
    } else {
      detailBox.innerHTML = `<p>查無此課程。</p>`;
    }
  </script>
</body>
</html>
